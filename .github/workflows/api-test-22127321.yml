name: API Testing with Newman - 22127321

on:
  push:
    branches: [ main, master ]
    paths:
      - '22127321_API_Users_Submission/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - '22127321_API_Users_Submission/**'
  workflow_dispatch:

jobs:
  api-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create reports directory
      run: mkdir -p 22127321_API_Users_Submission/reports
      
    - name: Run API tests with Newman
      run: |
        echo "🚀 Starting API Testing with Newman..."
        echo "Student ID: 22127321"
        echo "Date: $(date)"
        echo ""
        
        # Check if required files exist
        if [ ! -f "22127321_API_Users_Submission/collection.json" ]; then
          echo "❌ Collection file not found"
          exit 1
        fi
        
        if [ ! -f "22127321_API_Users_Submission/environment.json" ]; then
          echo "❌ Environment file not found"
          exit 1
        fi
        
        if [ ! -f "22127321_API_Users_Submission/user-accounts.csv" ]; then
          echo "❌ CSV data file not found"
          exit 1
        fi
        
        echo "✅ All required files found"
        echo ""
        
        # Run Newman with collection, environment, and CSV data
        echo "📊 Running API tests with Newman..."
        npx newman run 22127321_API_Users_Submission/collection.json \
          --environment 22127321_API_Users_Submission/environment.json \
          --iteration-data 22127321_API_Users_Submission/user-accounts.csv \
          --reporters cli,json,html \
          --reporter-json-export 22127321_API_Users_Submission/reports/api-test-results.json \
          --reporter-html-export 22127321_API_Users_Submission/reports/api-test-report.html \
          --bail
        
        # Check exit code
        if [ $? -eq 0 ]; then
          echo ""
          echo "✅ All tests passed successfully!"
          echo "📁 Test reports generated:"
          echo "   - JSON: 22127321_API_Users_Submission/reports/api-test-results.json"
          echo "   - HTML: 22127321_API_Users_Submission/reports/api-test-report.html"
        else
          echo ""
          echo "❌ Some tests failed. Check the reports for details."
          echo "📁 Test reports generated:"
          echo "   - JSON: 22127321_API_Users_Submission/reports/api-test-results.json"
          echo "   - HTML: 22127321_API_Users_Submission/reports/api-test-report.html"
        fi
        
        echo ""
        echo "🎯 Test execution completed!"
        echo "📊 Reports available in the '22127321_API_Users_Submission/reports' directory"
        
    - name: Upload test results as artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-reports-22127321
        path: |
          22127321_API_Users_Submission/reports/
        retention-days: 30
        
    - name: Display test results
      if: always()
      run: |
        echo "📊 Test Results Summary:"
        if [ -f "22127321_API_Users_Submission/reports/api-test-results.json" ]; then
          echo "✅ Test reports generated successfully"
          echo "📁 Files available:"
          ls -la 22127321_API_Users_Submission/reports/
        else
          echo "❌ No test reports found"
        fi 